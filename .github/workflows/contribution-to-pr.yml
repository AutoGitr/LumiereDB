name: Contribution to Pull Request
run-name: "Contribution #${{ github.event.issue.number }} approved by @${{ github.actor }}"

on:
  issue_comment:
    types: [created]

permissions: {}

concurrency:
  group: contribution-to-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  approve-gate:
    if: |
      !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'contribution')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      approved: ${{ steps.gate.outputs.approved }}

    steps:
      - name: Check approval command and permission
        id: gate
        env:
          ACTOR: ${{ github.actor }}
          COMMAND_BODY: ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          command_body="$(
            printf '%s' "$COMMAND_BODY" \
              | tr -d '\r' \
              | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'
          )"

          if [ "$command_body" != "@LumiereDB-bot approve" ]; then
            echo "approved=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          labels="$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')"

          if ! echo "$labels" | grep -qx "contribution"; then
            echo "approved=false" >> "$GITHUB_OUTPUT"
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
              --body "Ignoring approval command from @${ACTOR}: issue must have the \`contribution\` label."
            exit 0
          fi

          if ! echo "$labels" | grep -Eqx "movie|show"; then
            echo "approved=false" >> "$GITHUB_OUTPUT"
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
              --body "Ignoring approval command from @${ACTOR}: issue must use the movie or show contribution form."
            exit 0
          fi

          actor_permission="$(
            gh api "repos/${REPO}/collaborators/${ACTOR}/permission" \
              --jq '.permission' 2>/dev/null || true
          )"

          case "$actor_permission" in
            admin|maintain|write)
              echo "approved=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "approved=false" >> "$GITHUB_OUTPUT"
              gh issue comment "$ISSUE_NUMBER" --repo "$REPO" \
                --body "Ignoring approval command from @${ACTOR}: owner or maintainer access is required to approve contributions."
              ;;
          esac

  create-contribution-pr:
    needs: approve-gate
    if: needs.approve-gate.outputs.approved == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.LUMIEREDB_CLIENT_ID }}
          private-key: ${{ secrets.LUMIEREDB_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          ref: main
          token: ${{ steps.bot-token.outputs.token }}
          persist-credentials: true

      - name: Create contribution PR from issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail

          fail() {
            message="$1"
            echo "$message" >&2
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Could not create contribution pull request: ${message}"
            exit 1
          }

          body_file="$(mktemp)"
          printf '%s' "$ISSUE_BODY" > "$body_file"

          labels_file="$(mktemp)"
          gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name' > "$labels_file"

          if ! target="$(bash .github/scripts/build-contribution-entry.sh "$body_file" "$ISSUE_TITLE" "$labels_file" . 2>&1)"; then
            fail "$target"
          fi

          if ! validation_output="$(bash .github/scripts/validate-entry.sh "$target" schema/entry.schema.json 2>&1)"; then
            rm -f "$target"
            fail "$validation_output"
          fi

          if ! identity_output="$(bash .github/scripts/validate-dataset-identities.sh 2>&1)"; then
            rm -f "$target"
            fail "$identity_output"
          fi

          branch="contribution/issue-${ISSUE_NUMBER}"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            fail "Contribution branch already exists: \`${branch}\`. Please review the existing branch or pull request."
          fi

          git switch -c "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$target"

          if git diff --cached --quiet; then
            fail "No dataset changes were produced."
          fi

          git commit -m "Add dataset entry from contribution #${ISSUE_NUMBER}"
          git push origin "$branch"

          pr_body="$(printf 'Closes #%s\n\nAdds `%s` from the approved contribution.' "$ISSUE_NUMBER" "$target")"

          pr_url="$(
            gh pr create \
              --repo "$REPO" \
              --base main \
              --head "$branch" \
              --title "Add dataset entry from contribution #${ISSUE_NUMBER}" \
              --body "$pr_body"
          )"

          if ! gh pr merge "$pr_url" --repo "$REPO" --auto --squash --delete-branch; then
            failure_body="$(printf 'Created pull request for `%s`: %s\n\nAuto-merge could not be enabled. Check that repository auto-merge is enabled and that the GitHub App has pull request write access.' "$target" "$pr_url")"
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$failure_body"
            exit 1
          fi

          success_body="$(printf 'Created pull request for `%s`: %s\n\nAuto-merge is enabled. The pull request will merge after required checks pass.' "$target" "$pr_url")"
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$success_body"
