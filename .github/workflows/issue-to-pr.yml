name: Issue to Database

on:
  issues:
    types: [labeled]

permissions: {}

jobs:
  update-database:
    if: github.event.label.name == 'accepted'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create dataset JSON from issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          fail() {
            message="$1"
            echo "$message" >&2
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Could not update database branch: ${message}"
            exit 1
          }

          body_file="$(mktemp)"
          generated_file="$(mktemp)"
          printf '%s' "$ISSUE_BODY" > "$body_file"

          field() {
            awk -v heading="$1" '
              $0 == "### " heading { capture = 1; next }
              /^### / && capture { exit }
              capture { print }
            ' "$body_file" \
              | sed '/^[[:space:]]*$/d' \
              | sed 's/^_No response_$//'
          }

          clean_single_line() {
            printf '%s' "$1" | tr -d '\r' | head -n1
          }

          labels="$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')"

          if echo "$labels" | grep -qx "movie"; then
            media_type="movie"
          elif echo "$labels" | grep -qx "show"; then
            media_type="tv"
          else
            fail "Issue must have a movie or show label."
          fi

          title="$(clean_single_line "$(field "Title")")"
          year="$(clean_single_line "$(field "Year")")"
          tmdb_id="$(clean_single_line "$(field "TMDB ID")")"
          tvdb_id="$(clean_single_line "$(field "TVDB ID")")"
          imdb_id="$(clean_single_line "$(field "IMDb ID")")"
          poster_url="$(clean_single_line "$(field "Poster URL")")"
          background_url="$(clean_single_line "$(field "Background URL")")"
          logo_url="$(clean_single_line "$(field "Logo URL")")"
          youtube_id="$(clean_single_line "$(field "YouTube theme video ID")")"
          season_posters="$(field "Season posters")"
          episode_thumbs="$(field "Episode thumbnails")"

          [ -n "$title" ] || fail "Missing Title field."

          if [ "$media_type" = "movie" ]; then
            if [ -n "$tmdb_id" ]; then
              target="data/movies/tmdb-${tmdb_id}.json"
            elif [ -n "$imdb_id" ]; then
              target="data/movies/imdb-${imdb_id}.json"
            else
              fail "Movie submissions need a TMDB ID or IMDb ID."
            fi
          else
            if [ -n "$tvdb_id" ]; then
              target="data/tv/tvdb-${tvdb_id}.json"
            elif [ -n "$tmdb_id" ]; then
              target="data/tv/tmdb-${tmdb_id}.json"
            elif [ -n "$imdb_id" ]; then
              target="data/tv/imdb-${imdb_id}.json"
            else
              fail "TV submissions need a TVDB, TMDB, or IMDb ID."
            fi
          fi

          seasons_json="$(
            printf '%s\n' "$season_posters" | jq -R -s '
              split("\n")
              | map(select(length > 0 and contains("=")))
              | map(
                  capture("^(?<season_number>[0-9]+)=(?<poster_url>.+)$")
                  | {
                      season_number: (.season_number | tonumber),
                      poster_url
                    }
                )
            '
          )" || fail "Season posters must use season_number=url lines."

          episodes_json="$(
            printf '%s\n' "$episode_thumbs" | jq -R -s '
              split("\n")
              | map(select(length > 0 and contains("=")))
              | map(
                  capture("^(?<season_number>[0-9]+)x(?<episode_number>[0-9]+)=(?<thumb_url>.+)$")
                  | {
                      season_number: (.season_number | tonumber),
                      episode_number: (.episode_number | tonumber),
                      thumb_url
                    }
                )
            '
          )" || fail "Episode thumbnails must use season_numberxepisode_number=url lines."

          if ! jq -n \
              --arg media_type "$media_type" \
              --arg title "$title" \
              --arg year "$year" \
              --arg tmdb "$tmdb_id" \
              --arg tvdb "$tvdb_id" \
              --arg imdb "$imdb_id" \
              --arg poster "$poster_url" \
              --arg background "$background_url" \
              --arg logo "$logo_url" \
              --arg youtube "$youtube_id" \
              --argjson seasons "$seasons_json" \
              --argjson episodes "$episodes_json" \
              '{
                media_type: $media_type,
                title: $title,
                year: (if $year == "" then null else ($year | tonumber) end),
                external_ids: {
                  tmdb: (if $tmdb == "" then null else $tmdb end),
                  tvdb: (if $tvdb == "" then null else $tvdb end),
                  imdb: (if $imdb == "" then null else $imdb end)
                },
                art: {
                  poster_url: (if $poster == "" then null else $poster end),
                  background_url: (if $background == "" then null else $background end),
                  logo_url: (if $logo == "" then null else $logo end)
                },
                theme: {
                  youtube_id: (if $youtube == "" then null else $youtube end)
                },
                seasons: $seasons,
                episodes: $episodes
              }' > "$generated_file"; then
            fail "Submitted fields could not be converted into dataset JSON. Check numeric year and mapping fields."
          fi

          validation_target="$target"
          mkdir -p "$(dirname "$validation_target")"
          cp "$generated_file" "$validation_target"
          if ! validation_output="$(bash .github/scripts/validate-entry.sh "$validation_target" 2>&1)"; then
            rm -f "$validation_target"
            fail "$validation_output"
          fi
          rm -f "$validation_target"

          if git ls-remote --exit-code --heads origin database >/dev/null 2>&1; then
            git fetch origin database:database
            git worktree add database-worktree database
          else
            git worktree add --detach database-worktree
            git -C database-worktree checkout --orphan database
            git -C database-worktree rm -rf . || true
          fi

          if [ -f "database-worktree/$target" ]; then
            fail "Dataset file already exists on database branch: \`${target}\`. Please update it manually."
          fi

          mkdir -p "database-worktree/$(dirname "$target")"
          cp "$generated_file" "database-worktree/$target"

          git -C database-worktree config user.name "github-actions[bot]"
          git -C database-worktree config user.email "github-actions[bot]@users.noreply.github.com"
          git -C database-worktree add "$target"
          git -C database-worktree commit -m "Add dataset entry from issue #${ISSUE_NUMBER}"
          git -C database-worktree push origin HEAD:database

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Added dataset entry to \`database\`: \`$target\`."
          gh issue close "$ISSUE_NUMBER" --repo "$REPO" --comment "Dataset entry accepted and committed to the database branch."
