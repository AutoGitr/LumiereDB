name: Validate PR

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-guard:
    name: repo-guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Validate repository changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          else
            changed_files="$(find data -name '*.json' | sort || true)"
          fi

          dataset_files="$(printf '%s\n' "$changed_files" | grep -E '^data/.+\.json$' | sort || true)"

          if [ -z "$dataset_files" ]; then
            echo "No dataset files changed"
          else
            echo "Dataset files changed:"
            echo "$dataset_files"

            for file in $dataset_files; do
              echo "Checking $file"

              if [ ! -f "$file" ]; then
                echo "Skipping deleted file: $file"
                continue
              fi

              jq empty "$file"

              media_type="$(jq -r '.media_type // empty' "$file")"
              test "$media_type" = "movie" -o "$media_type" = "tv"

              title="$(jq -r '.title // empty' "$file")"
              test -n "$title"

              year="$(jq -r '.year // empty' "$file")"
              if [ -n "$year" ]; then
                echo "$year" | grep -Eq '^[0-9]{4}$'
              fi

              tmdb="$(jq -r '.external_ids.tmdb // empty' "$file")"
              tvdb="$(jq -r '.external_ids.tvdb // empty' "$file")"
              imdb="$(jq -r '.external_ids.imdb // empty' "$file")"

              if [ -n "$tmdb" ]; then echo "$tmdb" | grep -Eq '^[0-9]+$'; fi
              if [ -n "$tvdb" ]; then echo "$tvdb" | grep -Eq '^[0-9]+$'; fi
              if [ -n "$imdb" ]; then echo "$imdb" | grep -Eq '^tt[0-9]+$'; fi

              youtube_id="$(jq -r '.theme.youtube_id // empty' "$file")"
              if [ -n "$youtube_id" ]; then
                echo "$youtube_id" | grep -Eq '^[A-Za-z0-9_-]{11}$'
              fi

              jq -r '
                [
                  .art.poster_url,
                  .art.background_url,
                  .art.logo_url,
                  (.seasons[]?.poster_url),
                  (.episodes[]?.thumb_url)
                ] | .[] | select(. != null and . != "")
              ' "$file" | while IFS= read -r url; do
                echo "$url" | grep -Eq '^https://'
                case "$url" in
                  *githubusercontent.com*|*discordapp.com*|*discord.com*|*localhost*|*127.0.0.1*|*0.0.0.0*)
                    echo "Rejected unstable or unsafe URL: $url"
                    exit 1
                    ;;
                esac
              done
            done
          fi

          duplicate_filenames="$(
            find data -name '*.json' -printf '%f\n' \
              | sort \
              | uniq -d
          )"

          if [ -n "$duplicate_filenames" ]; then
            echo "Duplicate dataset filenames:"
            echo "$duplicate_filenames"
            exit 1
          fi
