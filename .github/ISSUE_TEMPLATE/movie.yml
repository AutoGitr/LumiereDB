name: Contribute movie metadata
description: Submit public art and theme links for a movie.
title: "[Movie]: "
labels: ["contribution", "movie"]

body:
  - type: input
    id: item_title
    attributes:
      label: Title
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: Year
      description: Four-digit release year.
      placeholder: "1957"

  - type: input
    id: tmdb_id
    attributes:
      label: TMDB ID
      description: Required if available on TMDB.
      placeholder: "389"

  - type: input
    id: tvdb_id
    attributes:
      label: TVDB ID
      description: Required if available on TVDB.
      placeholder: "572"

  - type: input
    id: imdb_id
    attributes:
      label: IMDb ID
      description: Required if available on IMDb.
      placeholder: "tt0050083"

  - type: input
    id: poster_url
    attributes:
      label: Poster URL
      description: HTTPS URL from image.tmdb.org, assets.fanart.tv, theposterdb.com/api/assets, artworks.thetvdb.com or metadata-static.plex.tv.

  - type: input
    id: background_url
    attributes:
      label: Background URL
      description: HTTPS URL from image.tmdb.org, assets.fanart.tv, theposterdb.com/api/assets, artworks.thetvdb.com or metadata-static.plex.tv.

  - type: input
    id: youtube_id
    attributes:
      label: YouTube theme video ID
      description: Use only the 11-character video ID, not the full URL.
      placeholder: abc123abc12
