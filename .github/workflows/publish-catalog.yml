name: Build Catalog

on:
  push:
    branches: [main]
    paths:
      - "data/**/*.json"
      - ".github/workflows/publish-catalog.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build catalog
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public

          files="$(find data -name '*.json' | sort)"
          if [ -z "$files" ]; then
            jq -n '{
              schema_version: 1,
              generated_at: now | todateiso8601,
              entries: []
            }' > public/catalog.json
          else
            jq -s '{
              schema_version: 1,
              generated_at: now | todateiso8601,
              entries: .
            }' $files > public/catalog.json
          fi

          gzip -c public/catalog.json > public/catalog.json.gz

      - name: Upload catalog artifact
        uses: actions/upload-artifact@v6
        with:
          name: lumiere-catalog
          path: |
            public/catalog.json
            public/catalog.json.gz
