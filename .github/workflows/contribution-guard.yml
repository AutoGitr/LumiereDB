name: Contribution Guard

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contribution-guard:
    name: contribution-guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Validate contribution changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
            deleted_dataset_files="$(git diff --name-only --diff-filter=D "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'data/**/*.json' || true)"
          else
            if [ -d data ]; then
              changed_files="$(find data -name '*.json' | sort)"
            else
              changed_files=""
            fi
            deleted_dataset_files=""
          fi

          if [ -n "$deleted_dataset_files" ]; then
            echo "Dataset entries may not be deleted in pull requests:"
            echo "$deleted_dataset_files"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] && [[ "${{ github.head_ref }}" == contribution/* ]]; then
            non_dataset_files="$(printf '%s\n' "$changed_files" | grep -Ev '^data/.+\.json$' || true)"
            if [ -n "$non_dataset_files" ]; then
              echo "Only dataset JSON files may change in contribution pull requests:"
              echo "$non_dataset_files"
              exit 1
            fi
          fi

          dataset_files="$(printf '%s\n' "$changed_files" | grep -E '^data/.+\.json$' | sort || true)"

          if [ -z "$dataset_files" ]; then
            echo "No dataset files changed"
          else
            echo "Dataset files changed:"
            echo "$dataset_files"

            while IFS= read -r file; do
              [ -n "$file" ] || continue
              bash .github/scripts/validate-entry.sh "$file"
            done <<< "$dataset_files"
          fi

          if [ -d data ]; then
            duplicate_filenames="$(
              find data -name '*.json' -printf '%f\n' \
                | sort \
                | uniq -d
            )"
          else
            duplicate_filenames=""
          fi

          if [ -n "$duplicate_filenames" ]; then
            echo "Duplicate dataset filenames:"
            echo "$duplicate_filenames"
            exit 1
          fi

          bash .github/scripts/validate-dataset-identities.sh
