name: Issue to Dataset PR

on:
  issues:
    types: [labeled]

permissions: {}

jobs:
  create-pr:
    if: github.event.label.name == 'accepted'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true

      - name: Create dataset JSON from issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          body_file="$(mktemp)"
          printf '%s' "$ISSUE_BODY" > "$body_file"

          field() {
            awk -v heading="$1" '
              $0 == "### " heading { capture = 1; next }
              /^### / && capture { exit }
              capture { print }
            ' "$body_file" \
              | sed '/^[[:space:]]*$/d' \
              | sed 's/^_No response_$//'
          }

          clean_single_line() {
            printf '%s' "$1" | tr -d '\r' | head -n1
          }

          labels="$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')"

          if echo "$labels" | grep -qx "movie"; then
            media_type="movie"
          elif echo "$labels" | grep -qx "show"; then
            media_type="tv"
          else
            echo "Issue must have movie or show label"
            exit 1
          fi

          title="$(clean_single_line "$(field "Title")")"
          year="$(clean_single_line "$(field "Year")")"
          tmdb_id="$(clean_single_line "$(field "TMDB ID")")"
          tvdb_id="$(clean_single_line "$(field "TVDB ID")")"
          imdb_id="$(clean_single_line "$(field "IMDb ID")")"
          poster_url="$(clean_single_line "$(field "Poster URL")")"
          background_url="$(clean_single_line "$(field "Background URL")")"
          logo_url="$(clean_single_line "$(field "Logo URL")")"
          youtube_id="$(clean_single_line "$(field "YouTube theme video ID")")"
          season_posters="$(field "Season posters")"
          episode_thumbs="$(field "Episode thumbnails")"

          if [ -z "$title" ]; then
            echo "Missing Title field"
            exit 1
          fi

          if [ ${#title} -gt 200 ]; then
            echo "Title is too long"
            exit 1
          fi

          if [ -n "$year" ]; then
            echo "$year" | grep -Eq '^[0-9]{4}$'
          fi

          if [ -n "$tmdb_id" ]; then
            echo "$tmdb_id" | grep -Eq '^[0-9]+$'
          fi

          if [ -n "$tvdb_id" ]; then
            echo "$tvdb_id" | grep -Eq '^[0-9]+$'
          fi

          if [ -n "$imdb_id" ]; then
            echo "$imdb_id" | grep -Eq '^tt[0-9]+$'
          fi

          if [ -n "$youtube_id" ]; then
            echo "$youtube_id" | grep -Eq '^[A-Za-z0-9_-]{11}$'
          fi

          validate_url() {
            url="$1"
            if [ -z "$url" ]; then
              return 0
            fi
            echo "$url" | grep -Eq '^https://'
            case "$url" in
              *githubusercontent.com*|*discordapp.com*|*discord.com*|*localhost*|*127.0.0.1*|*0.0.0.0*)
                echo "Rejected unstable or unsafe URL: $url"
                exit 1
                ;;
            esac
          }

          validate_url "$poster_url"
          validate_url "$background_url"
          validate_url "$logo_url"

          validate_mapping_lines() {
            name="$1"
            value="$2"
            pattern="$3"

            if [ -z "$value" ]; then
              return 0
            fi

            printf '%s\n' "$value" | while IFS= read -r line; do
              [ -z "$line" ] && continue
              echo "$line" | grep -Eq "$pattern"
              url="${line#*=}"
              validate_url "$url"
            done
          }

          validate_mapping_lines "Season posters" "$season_posters" '^[0-9]+=https://.+$'
          validate_mapping_lines "Episode thumbnails" "$episode_thumbs" '^[0-9]+x[0-9]+=https://.+$'

          if [ "$media_type" = "movie" ]; then
            mkdir -p data/movies

            if [ -n "$tmdb_id" ]; then
              target="data/movies/tmdb-${tmdb_id}.json"
            elif [ -n "$imdb_id" ]; then
              target="data/movies/imdb-${imdb_id}.json"
            else
              echo "Movie needs TMDB ID or IMDb ID"
              exit 1
            fi
          else
            mkdir -p data/tv

            if [ -n "$tvdb_id" ]; then
              target="data/tv/tvdb-${tvdb_id}.json"
            elif [ -n "$tmdb_id" ]; then
              target="data/tv/tmdb-${tmdb_id}.json"
            elif [ -n "$imdb_id" ]; then
              target="data/tv/imdb-${imdb_id}.json"
            else
              echo "TV item needs TVDB, TMDB, or IMDb ID"
              exit 1
            fi
          fi

          if [ -f "$target" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Dataset file already exists: \`$target\`. Please update it manually."
            exit 1
          fi

          seasons_json="$(
            printf '%s\n' "$season_posters" | jq -R -s '
              split("\n")
              | map(select(length > 0 and contains("=")))
              | map(
                  capture("^(?<season_number>[0-9]+)=(?<poster_url>.+)$")
                  | {
                      season_number: (.season_number | tonumber),
                      poster_url
                    }
                )
            '
          )"

          episodes_json="$(
            printf '%s\n' "$episode_thumbs" | jq -R -s '
              split("\n")
              | map(select(length > 0 and contains("=")))
              | map(
                  capture("^(?<season_number>[0-9]+)x(?<episode_number>[0-9]+)=(?<thumb_url>.+)$")
                  | {
                      season_number: (.season_number | tonumber),
                      episode_number: (.episode_number | tonumber),
                      thumb_url
                    }
                )
            '
          )"

          jq -n \
            --arg media_type "$media_type" \
            --arg title "$title" \
            --arg year "$year" \
            --arg tmdb "$tmdb_id" \
            --arg tvdb "$tvdb_id" \
            --arg imdb "$imdb_id" \
            --arg poster "$poster_url" \
            --arg background "$background_url" \
            --arg logo "$logo_url" \
            --arg youtube "$youtube_id" \
            --argjson seasons "$seasons_json" \
            --argjson episodes "$episodes_json" \
            '{
              media_type: $media_type,
              title: $title,
              year: (if $year == "" then null else ($year | tonumber) end),
              external_ids: {
                tmdb: (if $tmdb == "" then null else $tmdb end),
                tvdb: (if $tvdb == "" then null else $tvdb end),
                imdb: (if $imdb == "" then null else $imdb end)
              },
              art: {
                poster_url: $poster,
                background_url: $background,
                logo_url: $logo
              },
              theme: {
                youtube_id: $youtube
              },
              seasons: $seasons,
              episodes: $episodes
            }' > "$target"

          jq empty "$target"

          branch="dataset/issue-${ISSUE_NUMBER}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add "$target"
          git commit -m "Add dataset entry from issue #${ISSUE_NUMBER}"
          git push origin "$branch"

          pr_url="$(
            gh pr create \
              --repo "$REPO" \
              --title "Add dataset entry from issue #${ISSUE_NUMBER}" \
              --body "Created from #${ISSUE_NUMBER}. Closes #${ISSUE_NUMBER}." \
              --base main \
              --head "$branch"
          )"

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Created dataset PR: $pr_url"
