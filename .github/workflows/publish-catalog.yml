name: Publish Catalog

on:
  push:
    branches: [database]
    paths:
      - "data/**/*.json"
      - ".github/workflows/publish-catalog.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout database branch
        uses: actions/checkout@v6.0.2
        with:
          ref: database
          path: database

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6.0.2
        with:
          ref: gh-pages
          path: pages
          persist-credentials: true

      - name: Build catalog
        shell: bash
        run: |
          set -euo pipefail

          cd database
          mkdir -p public

          files="$(find data -name '*.json' | sort || true)"

          if [ -z "$files" ]; then
            jq -n '{
              schema_version: 1,
              generated_at: now | todateiso8601,
              entries: []
            }' > public/catalog.json
          else
            jq -s '{
              schema_version: 1,
              generated_at: now | todateiso8601,
              entries: sort_by(
                .media_type,
                .title,
                (.external_ids.tvdb // ""),
                (.external_ids.tmdb // ""),
                (.external_ids.imdb // "")
              )
            }' $files > public/catalog.json
          fi

          gzip -n -c public/catalog.json > public/catalog.json.gz

          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>LumiereDB</title>
            </head>
            <body>
              <h1>LumiereDB</h1>
              <ul>
                <li><a href="./catalog.json">catalog.json</a></li>
                <li><a href="./catalog.json.gz">catalog.json.gz</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Publish to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          find pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R database/public/. pages/

          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No gh-pages changes to publish"
            exit 0
          fi

          git commit -m "Publish catalog"
          git push origin gh-pages
        uses: actions/deploy-pages@v5
