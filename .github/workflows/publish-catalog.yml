name: Publish Catalog

on:
  push:
    branches: [main]
    paths:
      - "data/**/*.json"
      - ".github/workflows/publish-catalog.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build catalog
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p public

          files="$(find data -name '*.json' | sort || true)"

          if [ -z "$files" ]; then
            jq -n '{
              schema_version: 1,
              generated_at: now | todateiso8601,
              entries: []
            }' > public/catalog.json
          else
            jq -s '{
              schema_version: 1,
              generated_at: now | todateiso8601,
              entries: .
            }' $files > public/catalog.json
          fi

          gzip -c public/catalog.json > public/catalog.json.gz

          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>LumiereDB</title>
            </head>
            <body>
              <h1>LumiereDB</h1>
              <ul>
                <li><a href="./catalog.json">catalog.json</a></li>
                <li><a href="./catalog.json.gz">catalog.json.gz</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
