name: Contribute Lumiere metadata
description: Submit public art or theme links for a movie or show.
title: "[Contribution]: "
labels: ["contribution"]

body:
  - type: dropdown
    id: media_type
    attributes:
      label: Media type
      options:
        - movie
        - tv
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Title
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: Year

  - type: input
    id: tmdb_id
    attributes:
      label: TMDB ID

  - type: input
    id: tvdb_id
    attributes:
      label: TVDB ID

  - type: input
    id: imdb_id
    attributes:
      label: IMDb ID

  - type: input
    id: poster_url
    attributes:
      label: Poster URL

  - type: input
    id: background_url
    attributes:
      label: Background URL

  - type: input
    id: logo_url
    attributes:
      label: Logo URL

  - type: input
    id: youtube_id
    attributes:
      label: YouTube theme video ID

  - type: textarea
    id: season_posters
    attributes:
      label: Season posters
      description: One per line, format season_number=url

  - type: textarea
    id: episode_thumbs
    attributes:
      label: Episode thumbnails
      description: One per line, format season_numberxepisode_number=url
