name: Publish Catalog

on:
  push:
    branches: [database]
    paths:
      - "data/**/*.json"
      - "schema/entry.schema.json"
      - ".github/workflows/publish-catalog.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout catalog source
        uses: actions/checkout@v6.0.2

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build catalog
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p public

          mapfile -t files < <(find data -name '*.json' | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            jq -n '{
              schema_version: 1,
              generated_at: now | todateiso8601,
              entries: []
            }' > public/catalog.json
          else
            jq -s '{
              schema_version: 1,
              generated_at: now | todateiso8601,
              entries: sort_by(
                .media_type,
                .title,
                (.external_ids.tvdb // ""),
                (.external_ids.tmdb // ""),
                (.external_ids.imdb // "")
              )
            }' "${files[@]}" > public/catalog.json
          fi

          gzip -n -c public/catalog.json > public/catalog.json.gz

          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>LumiereDB</title>
            </head>
            <body>
              <h1>LumiereDB</h1>
              <ul>
                <li><a href="./catalog.json">catalog.json</a></li>
                <li><a href="./catalog.json.gz">catalog.json.gz</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
